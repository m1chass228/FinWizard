name: Windows Build

on:
  push:
    branches: [ "dev", "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Скачиваем код
        uses: actions/checkout@v4

      - name: Устанавливаем Qt 6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Настраиваем CMake
        # Указываем -S FinWizard_dll, так как CMakeLists.txt лежит там
        run: cmake -B build -S FinWizard_dll -DCMAKE_BUILD_TYPE=Release

      - name: Собираем проект
        run: cmake --build build --config Release

      - name: Подготавливаем файлы (windeployqt)
        shell: pwsh
        run: |
          mkdir FinWizard_Release
          # Путь к EXE теперь будет зависеть от того, как прописано в CMakeLists.txt
          # Обычно это build/src/Release/ или build/Release/
          # Я использую маску *, чтобы он точно нашел файл
          Get-ChildItem -Path build -Filter FinWizardGui.exe -Recurse | Copy-Item -Destination FinWizard_Release\

          # Запускаем деплоймент
          windeployqt FinWizard_Release\FinWizardGui.exe

      - name: Загружаем готовый результат
        uses: actions/upload-artifact@v4
        with:
          name: FinWizard-Windows-App
          path: FinWizard_Release\
